{% extends 'base.html' %}
{% block auth_content %}
<div class="min-h-screen bg-[#f3f4f6] flex items-center justify-center p-4">
  <div class="w-full max-w-sm">
    <div class="text-center mb-8">
      <div class="w-12 h-12 rounded-xl bg-[#03363d] flex items-center justify-center text-white font-black text-lg mx-auto mb-4">IT</div>
      <h1 class="text-xl font-bold text-[#2f3941]">IT Helpdesk</h1>
      <p class="text-sm text-[#68737d] mt-1">Sign in to your account</p>
    </div>
    {% for message in messages %}
    <div class="mb-4 px-4 py-3 rounded text-sm bg-red-50 text-red-700 border border-red-200">{{ message }}</div>
    {% endfor %}
    <div class="bg-white rounded-lg border border-[#d8dcde] p-6 shadow-sm">
      <form method="post" class="space-y-4">
        {% csrf_token %}
        {% if next %}<input type="hidden" name="next" value="{{ next }}">{% endif %}
        <div>
          <label class="zd-label">Username</label>
          <input name="username" type="text" required autofocus class="zd-input" placeholder="Enter your username">
        </div>
        <div>
          <label class="zd-label">Password</label>
          <input name="password" type="password" required class="zd-input" placeholder="Enter your password">
        </div>
        <button type="submit" class="zd-btn zd-btn-primary w-full justify-center py-2.5 text-sm">Sign In</button>
      </form>
    </div>
  </div>
</div>
{% endblock %}

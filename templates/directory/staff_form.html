{% extends 'base.html' %}
{% block title %}{{ action }} Staff{% endblock %}
{% block content %}
<div class="max-w-xl mx-auto">
  <div class="mb-5">
    <a href="{% url 'staff_list' %}" class="text-sm text-gray-400 hover:text-blue-600">Back to Directory</a>
    <h1 class="text-xl font-bold text-gray-900 mt-2">{{ action }} Staff Member</h1>
  </div>
  <div class="zd-card p-5">
    <form method="post" class="space-y-4">
      {% csrf_token %}
      <div class="grid grid-cols-2 gap-4">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1.5" for="{{ form.first_name.id_for_label }}">First Name</label>
          <input id="{{ form.first_name.id_for_label }}" name="first_name" value="{{ form.first_name.value|default:'' }}" required class="zd-input">
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1.5" for="{{ form.last_name.id_for_label }}">Last Name</label>
          <input id="{{ form.last_name.id_for_label }}" name="last_name" value="{{ form.last_name.value|default:'' }}" required class="zd-input">
        </div>
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1.5" for="{{ form.email.id_for_label }}">Email</label>
        <input id="{{ form.email.id_for_label }}" name="email" type="email" value="{{ form.email.value|default:'' }}" required class="zd-input">
      </div>
      <div class="grid grid-cols-2 gap-4">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1.5" for="{{ form.phone.id_for_label }}">Phone</label>
          <input id="{{ form.phone.id_for_label }}" name="phone" value="{{ form.phone.value|default:'' }}" class="zd-input">
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1.5" for="{{ form.job_title.id_for_label }}">Job Title</label>
          <input id="{{ form.job_title.id_for_label }}" name="job_title" value="{{ form.job_title.value|default:'' }}" class="zd-input">
        </div>
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1.5" for="{{ form.department.id_for_label }}">Department</label>
        <select id="{{ form.department.id_for_label }}" name="department" class="zd-input">
          <option value="">Select department</option>
          {% for d in departments %}
          <option value="{{ d.id }}" {% if form.department.value|stringformat:"s" == d.id|stringformat:"s" %}selected{% endif %}>{{ d.name }}</option>
          {% endfor %}
        </select>
      </div>
      {% if member %}
      <div class="flex items-center gap-2">
        <input type="checkbox" name="is_active" id="{{ form.is_active.id_for_label }}" {% if form.is_active.value %}checked{% endif %} class="rounded">
        <label for="{{ form.is_active.id_for_label }}" class="text-sm text-gray-700">Active</label>
      </div>
      {% endif %}
      <div class="flex gap-3 pt-2">
        <button type="submit" class="zd-btn zd-btn-primary">Save</button>
        <a href="{% url 'staff_list' %}" class="zd-btn zd-btn-secondary">Cancel</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}

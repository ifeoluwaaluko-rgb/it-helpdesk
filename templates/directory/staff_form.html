{% extends 'base.html' %}
{% block title %}{{ action }} Staff{% endblock %}
{% block content %}
<div class="max-w-xl mx-auto">
  <div class="mb-5"><a href="{% url 'staff_list' %}" class="text-sm text-gray-400 hover:text-blue-600">← Directory</a><h1 class="text-xl font-bold text-gray-900 mt-2">{{ action }} Staff Member</h1></div>
  <div class="zd-card p-5">
    <form method="post" class="space-y-4">
      {% csrf_token %}
      <div class="grid grid-cols-2 gap-4">
        <div><label class="block text-sm font-medium text-gray-700 mb-1.5">First Name</label><input name="first_name" value="{{ member.first_name|default:'' }}" required class="zd-input"></div>
        <div><label class="block text-sm font-medium text-gray-700 mb-1.5">Last Name</label><input name="last_name" value="{{ member.last_name|default:'' }}" required class="zd-input"></div>
      </div>
      <div><label class="block text-sm font-medium text-gray-700 mb-1.5">Email</label><input name="email" type="email" value="{{ member.email|default:'' }}" required class="zd-input"></div>
      <div class="grid grid-cols-2 gap-4">
        <div><label class="block text-sm font-medium text-gray-700 mb-1.5">Phone</label><input name="phone" value="{{ member.phone|default:'' }}" class="zd-input"></div>
        <div><label class="block text-sm font-medium text-gray-700 mb-1.5">Job Title</label><input name="job_title" value="{{ member.job_title|default:'' }}" class="zd-input"></div>
      </div>
      <div><label class="block text-sm font-medium text-gray-700 mb-1.5">Department</label><select name="department" class="zd-input"><option value="">— Select —</option>{% for d in departments %}<option value="{{ d.id }}" {% if member.department.id == d.id %}selected{% endif %}>{{ d.name }}</option>{% endfor %}</select></div>
      {% if member %}<div class="flex items-center gap-2"><input type="checkbox" name="is_active" id="is_active" {% if member.is_active %}checked{% endif %} class="rounded"><label for="is_active" class="text-sm text-gray-700">Active</label></div>{% endif %}
      <div class="flex gap-3 pt-2">
        <button type="submit" class="zd-btn zd-btn-primary">Save</button>
        <a href="{% url 'staff_list' %}" class="zd-btn zd-btn-secondary">Cancel</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}

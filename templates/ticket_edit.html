{% extends 'base.html' %}
{% block title %}Edit #{{ ticket.id }}{% endblock %}
{% block breadcrumb %}<a href="{% url 'ticket_list' %}">Tickets</a> / <a href="{% url 'ticket_detail' ticket.pk %}">#{{ ticket.id }}</a> / Edit{% endblock %}
{% block content %}
<div class="max-w-2xl">
  <h1 class="text-lg font-bold text-[#2f3941] mb-4">Edit Ticket #{{ ticket.id }}</h1>
  <div class="zd-card p-6">
    <form method="post" class="space-y-4">
      {% csrf_token %}
      <div>
        <label class="zd-label" for="{{ form.title.id_for_label }}">Title <span class="text-red-500">*</span></label>
        <input id="{{ form.title.id_for_label }}" name="title" value="{{ form.title.value|default:'' }}" required class="zd-input">
      </div>
      <div>
        <label class="zd-label" for="{{ form.description.id_for_label }}">Description <span class="text-red-500">*</span></label>
        <textarea id="{{ form.description.id_for_label }}" name="description" rows="6" required class="zd-input resize-none">{{ form.description.value|default:'' }}</textarea>
      </div>
      <div class="grid grid-cols-1 sm:grid-cols-3 gap-3">
        <div>
          <label class="zd-label" for="{{ form.category.id_for_label }}">Category</label>
          <select name="category" id="cat-sel" class="zd-select" onchange="loadSubs(this.value)">
            {% for val, label in category_choices %}
            <option value="{{ val }}" {% if form.category.value == val %}selected{% endif %}>{{ label }}</option>
            {% endfor %}
          </select>
        </div>
        <div>
          <label class="zd-label" for="{{ form.subcategory.id_for_label }}">Subcategory</label>
          <select name="subcategory" id="sub-sel" class="zd-select">
            <option value="{{ form.subcategory.value|default:'' }}">{{ form.subcategory.value|default:"Select" }}</option>
          </select>
        </div>
        <div>
          <label class="zd-label" for="{{ form.item.id_for_label }}">Item</label>
          <input id="{{ form.item.id_for_label }}" name="item" value="{{ form.item.value|default:'' }}" class="zd-input" placeholder="e.g. Microsoft Teams">
        </div>
      </div>
      <div class="grid grid-cols-2 gap-3">
        <div>
          <label class="zd-label" for="{{ form.priority.id_for_label }}">Priority</label>
          <select name="priority" class="zd-select">
            {% for val, label in priority_choices %}
            <option value="{{ val }}" {% if form.priority.value == val %}selected{% endif %}>{{ label }}</option>
            {% endfor %}
          </select>
        </div>
        {% if can_edit_status %}
        <div>
          <label class="zd-label" for="{{ form.status.id_for_label }}">Status</label>
          <select name="status" class="zd-select">
            {% for val, label in status_choices %}
            <option value="{{ val }}" {% if form.status.value == val %}selected{% endif %}>{{ label }}</option>
            {% endfor %}
          </select>
        </div>
        {% endif %}
      </div>
      <div>
        <label class="zd-label" for="{{ form.tags.id_for_label }}">Tags <span class="text-[#68737d] font-normal">(comma-separated)</span></label>
        <input id="{{ form.tags.id_for_label }}" name="tags" value="{{ form.tags.value|default:'' }}" class="zd-input" placeholder="vpn, windows, floor-2">
      </div>
      <div>
        <label class="zd-label" for="{{ form.edit_note.id_for_label }}">Edit Note <span class="text-[#68737d] font-normal">(describe what you changed)</span></label>
        <input id="{{ form.edit_note.id_for_label }}" name="edit_note" value="{{ form.edit_note.value|default:'' }}" class="zd-input" placeholder="e.g. Corrected category from hardware to software">
      </div>
      <div class="flex gap-3 pt-2">
        <button type="submit" class="zd-btn zd-btn-primary">Save Changes</button>
        <a href="{% url 'ticket_detail' ticket.pk %}" class="zd-btn zd-btn-secondary">Cancel</a>
      </div>
    </form>
  </div>
</div>
<script>
const tree = {{ category_tree_json|safe }};
function loadSubs(cat, sel) {
  const s = document.getElementById('sub-sel');
  s.innerHTML = '<option value="">Select</option>';
  Object.keys(tree[cat]?.subcategories || {}).forEach(sub => {
    const o = document.createElement('option');
    o.value = sub; o.textContent = sub;
    if (sub === sel) o.selected = true;
    s.appendChild(o);
  });
}
loadSubs('{{ form.category.value|default:ticket.category|escapejs }}', '{{ form.subcategory.value|default:ticket.subcategory|escapejs }}');
</script>
{% endblock %}

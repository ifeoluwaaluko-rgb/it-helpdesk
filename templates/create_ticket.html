{% extends 'base.html' %}
{% block title %}New Ticket{% endblock %}
{% block content %}
<div class="max-w-2xl mx-auto">
  <div class="mb-6">
    <h1 class="text-xl font-bold text-gray-900">Create New Ticket</h1>
    <p class="text-sm text-gray-500 mt-1">Ticket will be auto-classified and assigned.</p>
  </div>

  <div class="card">
    <form method="post" class="space-y-5">
      {% csrf_token %}

      <!-- Staff member search -->
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1.5">Requester <span class="text-red-500">*</span></label>
        <div class="relative">
          <input type="text" id="staff-search" placeholder="Search by name or email..."
            autocomplete="off"
            class="w-full border border-gray-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400">
          <div id="staff-dropdown" class="absolute z-10 w-full bg-white border border-gray-200 rounded-xl shadow-lg mt-1 hidden max-h-48 overflow-y-auto"></div>
        </div>
        <input type="hidden" id="staff-id" name="staff_member">
        <input type="email" id="user-email-hidden" name="user_email" required class="hidden">
        <p id="selected-staff" class="text-xs text-blue-600 mt-1 hidden"></p>
        <p class="text-xs text-gray-400 mt-1">Or type an email directly if not in directory:</p>
        <input type="email" id="user-email-manual" placeholder="staff@company.com"
          class="mt-1 w-full border border-gray-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400">
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1.5">Channel</label>
        <select name="channel" class="w-full border border-gray-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400">
          {% for val, label in ticket.CHANNEL_CHOICES|default:"" %}
          <option value="{{ val }}">{{ label }}</option>
          {% empty %}
          <option value="walk_in">Walk-in</option>
          <option value="phone">Phone Call</option>
          <option value="chat">Chat (WhatsApp/Teams/Slack)</option>
          <option value="manual">Manual Entry</option>
          {% endfor %}
        </select>
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1.5">Issue Title <span class="text-red-500">*</span></label>
        <input name="title" type="text" required placeholder="e.g. Cannot connect to VPN"
          class="w-full border border-gray-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400">
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1.5">Description <span class="text-red-500">*</span></label>
        <textarea name="description" rows="5" required placeholder="Describe the issue in detail..."
          class="w-full border border-gray-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400 resize-none"></textarea>
      </div>

      <div class="flex gap-3 pt-1">
        <button type="submit" class="btn-primary flex-1 sm:flex-none text-center">Create & Assign Ticket</button>
        <a href="{% url 'ticket_list' %}" class="btn-secondary">Cancel</a>
      </div>
    </form>
  </div>
</div>

<script>
const searchInput = document.getElementById('staff-search');
const dropdown = document.getElementById('staff-dropdown');
const staffId = document.getElementById('staff-id');
const emailHidden = document.getElementById('user-email-hidden');
const emailManual = document.getElementById('user-email-manual');
const selectedLabel = document.getElementById('selected-staff');
let debounce;

searchInput.addEventListener('input', () => {
  clearTimeout(debounce);
  const q = searchInput.value.trim();
  if (q.length < 2) { dropdown.classList.add('hidden'); return; }
  debounce = setTimeout(() => {
    fetch(`/api/staff/search/?q=${encodeURIComponent(q)}`)
      .then(r => r.json())
      .then(data => {
        dropdown.innerHTML = '';
        if (!data.results.length) { dropdown.classList.add('hidden'); return; }
        data.results.forEach(m => {
          const div = document.createElement('div');
          div.className = 'px-4 py-2.5 hover:bg-blue-50 cursor-pointer text-sm border-b border-gray-50 last:border-0';
          div.innerHTML = `<p class="font-medium text-gray-800">${m.name}</p><p class="text-xs text-gray-500">${m.email}${m.department ? ' · '+m.department : ''}</p>`;
          div.onclick = () => {
            staffId.value = m.id;
            emailHidden.value = m.email;
            emailManual.value = '';
            searchInput.value = m.name;
            selectedLabel.textContent = `✓ ${m.name} (${m.email})`;
            selectedLabel.classList.remove('hidden');
            dropdown.classList.add('hidden');
          };
          dropdown.appendChild(div);
        });
        dropdown.classList.remove('hidden');
      });
  }, 200);
});

// Manual email overrides staff selection
emailManual.addEventListener('input', () => {
  if (emailManual.value) {
    emailHidden.value = emailManual.value;
    staffId.value = '';
    selectedLabel.classList.add('hidden');
  }
});

document.addEventListener('click', e => {
  if (!e.target.closest('#staff-search') && !e.target.closest('#staff-dropdown')) dropdown.classList.add('hidden');
});
</script>
{% endblock %}

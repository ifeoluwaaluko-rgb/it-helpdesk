<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Set up Zynaros</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-slate-100 flex items-center justify-center p-6">
  <div class="w-full max-w-md bg-white rounded-2xl shadow border p-8">
    <h1 class="text-2xl font-bold text-slate-900 mb-2">Set up Zynaros</h1>
    <p class="text-sm text-slate-500 mb-6">Create the first administrator account.</p>
    {% if messages %}
      {% for message in messages %}
      <div class="mb-4 rounded-lg px-4 py-3 text-sm bg-red-50 text-red-700 border border-red-200">{{ message }}</div>
      {% endfor %}
    {% endif %}
    <form method="post" class="space-y-4">
      {% csrf_token %}
      <input name="full_name" class="w-full border rounded-lg px-3 py-2" placeholder="Full name">
      <input name="email" type="email" class="w-full border rounded-lg px-3 py-2" placeholder="Email">
      <input name="username" class="w-full border rounded-lg px-3 py-2" placeholder="Username" required>
      <input name="password" type="password" class="w-full border rounded-lg px-3 py-2" placeholder="Password" required>
      <button class="w-full rounded-lg bg-blue-600 text-white font-semibold py-2.5">Create administrator</button>
    </form>
    <p class="text-xs text-slate-400 mt-6">Seeded demo users can still use the Sign In page when seed data exists.</p>
  </div>
</body>
</html>

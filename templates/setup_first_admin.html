{% extends 'base.html' %}
{% block title %}Set Up IT Helpdesk{% endblock %}
{% block content %}
<div class="min-h-screen flex items-center justify-center py-10">
  <div class="w-full max-w-lg bg-white rounded-2xl shadow border border-slate-200 p-8">
    <div class="text-center mb-8">
      <div class="inline-flex h-16 w-16 items-center justify-center rounded-2xl bg-teal-900 text-white text-3xl font-bold mb-4">IT</div>
      <h1 class="text-3xl font-bold text-slate-800">First-Time Setup</h1>
      <p class="text-slate-500 mt-2">Create the first administrator account for your helpdesk.</p>
    </div>

    <form method="post" class="space-y-5">
      {% csrf_token %}
      <div>
        <label class="block text-sm font-medium text-slate-700 mb-2">Full name</label>
        <input type="text" name="full_name" required class="w-full rounded-xl border border-slate-300 px-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="Jane Doe">
      </div>
      <div>
        <label class="block text-sm font-medium text-slate-700 mb-2">Username</label>
        <input type="text" name="username" required class="w-full rounded-xl border border-slate-300 px-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="admin">
      </div>
      <div>
        <label class="block text-sm font-medium text-slate-700 mb-2">Email</label>
        <input type="email" name="email" required class="w-full rounded-xl border border-slate-300 px-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="admin@example.com">
      </div>
      <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <div>
          <label class="block text-sm font-medium text-slate-700 mb-2">Password</label>
          <input type="password" name="password" required class="w-full rounded-xl border border-slate-300 px-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-500">
        </div>
        <div>
          <label class="block text-sm font-medium text-slate-700 mb-2">Confirm password</label>
          <input type="password" name="confirm_password" required class="w-full rounded-xl border border-slate-300 px-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-500">
        </div>
      </div>

      <button type="submit" class="w-full rounded-xl bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3">
        Create Administrator
      </button>
    </form>
  </div>
</div>
{% endblock %}

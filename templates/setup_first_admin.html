<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>First-time setup — IT Helpdesk</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-slate-100 flex items-center justify-center p-6">
  <div class="w-full max-w-lg">
    <div class="bg-white rounded-2xl shadow-sm border border-slate-200 p-8">
      <div class="flex flex-col items-center text-center mb-8">
        <div class="w-16 h-16 rounded-2xl bg-teal-900 text-white flex items-center justify-center text-2xl font-bold mb-4">IT</div>
        <h1 class="text-3xl font-bold text-slate-800">Set up your helpdesk</h1>
        <p class="text-slate-500 mt-2">Create the first administrator account to finish setup.</p>
      </div>

      {% if messages %}
        <div class="space-y-3 mb-6">
          {% for message in messages %}
            <div class="rounded-xl border px-4 py-3 text-sm {% if message.tags == 'error' %}border-red-200 bg-red-50 text-red-700{% else %}border-green-200 bg-green-50 text-green-700{% endif %}">
              {{ message }}
            </div>
          {% endfor %}
        </div>
      {% endif %}

      <form method="post" class="space-y-5">
        {% csrf_token %}
        <div>
          <label class="block text-sm font-medium text-slate-700 mb-2">Full name</label>
          <input type="text" name="full_name" class="w-full rounded-xl border border-slate-300 px-4 py-3 outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500" placeholder="Jane Doe" required>
        </div>

        <div>
          <label class="block text-sm font-medium text-slate-700 mb-2">Email address</label>
          <input type="email" name="email" class="w-full rounded-xl border border-slate-300 px-4 py-3 outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500" placeholder="jane@company.com" required>
        </div>

        <div>
          <label class="block text-sm font-medium text-slate-700 mb-2">Username</label>
          <input type="text" name="username" class="w-full rounded-xl border border-slate-300 px-4 py-3 outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500" placeholder="admin" required>
        </div>

        <div>
          <label class="block text-sm font-medium text-slate-700 mb-2">Password</label>
          <input type="password" name="password" class="w-full rounded-xl border border-slate-300 px-4 py-3 outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500" placeholder="Create a strong password" required>
        </div>

        <div>
          <label class="block text-sm font-medium text-slate-700 mb-2">Confirm password</label>
          <input type="password" name="confirm_password" class="w-full rounded-xl border border-slate-300 px-4 py-3 outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500" placeholder="Repeat password" required>
        </div>

        <button type="submit" class="w-full rounded-xl bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 transition">
          Create administrator
        </button>
      </form>
    </div>
  </div>
</body>
</html>

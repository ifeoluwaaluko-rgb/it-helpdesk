{% extends 'base.html' %}
{% block title %}Delete Article – Knowledge Base{% endblock %}
{% block content %}
<div class="max-w-md mx-auto mt-16">
  <div class="bg-white rounded-2xl border border-gray-100 shadow-sm p-8 text-center">
    <div class="w-14 h-14 bg-red-100 rounded-full flex items-center justify-center text-3xl mx-auto mb-4">🗑</div>
    <h1 class="text-lg font-bold text-gray-800 mb-2">Delete Article?</h1>
    <p class="text-sm text-gray-500 mb-6">
      You are about to permanently delete <strong>"{{ article.title }}"</strong>.<br>
      This action cannot be undone.
    </p>
    <form method="post" class="flex gap-3 justify-center">
      {% csrf_token %}
      <a href="{% url 'article_detail' article.pk %}" class="zd-btn zd-btn-secondary">Cancel</a>
      <button type="submit" class="zd-btn zd-btn-danger bg-red-600 text-white border-red-600 hover:bg-red-700">Yes, Delete</button>
    </form>
  </div>
</div>
{% endblock %}

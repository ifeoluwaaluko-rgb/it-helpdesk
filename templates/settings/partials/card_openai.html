<div class="bg-white rounded-2xl border border-gray-100 shadow-sm overflow-hidden">
  <div class="px-6 py-4 border-b border-gray-100 flex items-center justify-between gap-3">
    <div class="flex items-center gap-3">
      <span class="text-2xl">🤖</span>
      <div>
        <h2 class="text-sm font-bold text-gray-800">AI Provider</h2>
        <p class="text-xs text-gray-400">Store AI configuration for ticket classification</p>
      </div>
    </div>
    <div class="flex items-center gap-2">
      {% if configs.openai.is_configured %}
      <span class="tag bg-green-100 text-green-700">Configured</span>
      {% else %}
      <span class="tag bg-gray-100 text-gray-600">Not set</span>
      {% endif %}
      <button type="button" onclick="testConn('openai', this)" class="zd-btn zd-btn-secondary text-xs">Test</button>
      <button type="button" onclick="toggleIntegration('openai-card')" class="zd-btn zd-btn-primary text-xs">Configure</button>
    </div>
  </div>
  <div id="openai-card" class="hidden px-6 py-5">
    <form method="post" action="{% url 'save_openai' %}" class="grid grid-cols-1 sm:grid-cols-2 gap-4">
      {% csrf_token %}
      
<div><label class="zd-label">Base URL</label><input name="host" value="{{ configs.openai.host|default:'https://api.openai.com/v1' }}" class="zd-input"></div>
<div><label class="zd-label">Model</label><input name="model_name" value="{{ configs.openai.username|default:'gpt-4o-mini' }}" class="zd-input"></div>
<div class="sm:col-span-2"><label class="zd-label">API Key</label><input name="access_token" type="password" class="zd-input" placeholder="{{ configs.openai.masked_token }}"></div>
<div class="sm:col-span-2"><label class="flex items-center gap-2 text-sm"><input type="checkbox" name="is_active" {% if configs.openai.is_active %}checked{% endif %}> Active</label></div>

      <div class="sm:col-span-2 pt-2">
        <button class="zd-btn zd-btn-primary">Save</button>
      </div>
    </form>
  </div>
</div>

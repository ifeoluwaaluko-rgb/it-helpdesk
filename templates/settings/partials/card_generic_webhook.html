<div class="bg-white rounded-2xl border border-gray-100 shadow-sm overflow-hidden">
  <div class="px-6 py-4 border-b border-gray-100 flex items-center justify-between gap-3">
    <div class="flex items-center gap-3">
      <span class="text-2xl">🪝</span>
      <div>
        <h2 class="text-sm font-bold text-gray-800">Generic Webhook</h2>
        <p class="text-xs text-gray-400">Use for external automation and notifications</p>
      </div>
    </div>
    <div class="flex items-center gap-2">
      {% if configs.generic_webhook.is_configured %}
      <span class="tag bg-green-100 text-green-700">Configured</span>
      {% else %}
      <span class="tag bg-gray-100 text-gray-600">Not set</span>
      {% endif %}
      <button type="button" onclick="testConn('generic_webhook', this)" class="zd-btn zd-btn-secondary text-xs">Test</button>
      <button type="button" onclick="toggleIntegration('generic-webhook-card')" class="zd-btn zd-btn-primary text-xs">Configure</button>
    </div>
  </div>
  <div id="generic-webhook-card" class="hidden px-6 py-5">
    <form method="post" action="{% url 'save_generic_webhook' %}" class="grid grid-cols-1 sm:grid-cols-2 gap-4">
      {% csrf_token %}
      
<div><label class="zd-label">Label / Endpoint Name</label><input name="host" value="{{ configs.generic_webhook.host }}" class="zd-input" placeholder="Automation server"></div>
<div class="sm:col-span-2"><label class="zd-label">Webhook URL</label><input name="webhook_url" value="{{ configs.generic_webhook.webhook_url }}" class="zd-input" placeholder="https://example.com/webhook"></div>
<div><label class="zd-label">Bearer Token (optional)</label><input name="access_token" type="password" class="zd-input" placeholder="{{ configs.generic_webhook.masked_token }}"></div>
<div><label class="zd-label">Status</label><label class="flex items-center gap-2 text-sm mt-2"><input type="checkbox" name="is_active" {% if configs.generic_webhook.is_active %}checked{% endif %}> Active</label></div>

      <div class="sm:col-span-2 pt-2">
        <button class="zd-btn zd-btn-primary">Save</button>
      </div>
    </form>
  </div>
</div>

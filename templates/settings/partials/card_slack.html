<div class="bg-white rounded-2xl border border-gray-100 shadow-sm overflow-hidden">
  <div class="px-6 py-4 border-b border-gray-100 flex items-center justify-between gap-3">
    <div class="flex items-center gap-3">
      <span class="text-2xl">🧵</span>
      <div>
        <h2 class="text-sm font-bold text-gray-800">Slack</h2>
        <p class="text-xs text-gray-400">Post alerts to a Slack webhook</p>
      </div>
    </div>
    <div class="flex items-center gap-2">
      {% if configs.slack.is_configured %}
      <span class="tag bg-green-100 text-green-700">Configured</span>
      {% else %}
      <span class="tag bg-gray-100 text-gray-600">Not set</span>
      {% endif %}
      <button type="button" onclick="testConn('slack', this)" class="zd-btn zd-btn-secondary text-xs">Test</button>
      <button type="button" onclick="toggleIntegration('slack-card')" class="zd-btn zd-btn-primary text-xs">Configure</button>
    </div>
  </div>
  <div id="slack-card" class="hidden px-6 py-5">
    <form method="post" action="{% url 'save_slack' %}" class="grid grid-cols-1 sm:grid-cols-2 gap-4">
      {% csrf_token %}
      
<div class="sm:col-span-2"><label class="zd-label">Webhook URL</label><input name="webhook_url" value="{{ configs.slack.webhook_url }}" class="zd-input"></div>
<div class="sm:col-span-2"><label class="flex items-center gap-2 text-sm"><input type="checkbox" name="is_active" {% if configs.slack.is_active %}checked{% endif %}> Active</label></div>

      <div class="sm:col-span-2 pt-2">
        <button class="zd-btn zd-btn-primary">Save</button>
      </div>
    </form>
  </div>
</div>

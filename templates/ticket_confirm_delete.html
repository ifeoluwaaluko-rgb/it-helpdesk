{% extends 'base.html' %}
{% block title %}Delete Ticket #{{ ticket.id }}{% endblock %}
{% block content %}
<div class="max-w-md mx-auto mt-10">
  <div class="zd-card p-6 border-red-200">
    <div class="flex items-center gap-3 mb-4">
      <div class="w-10 h-10 rounded-full bg-red-100 flex items-center justify-center text-red-500">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
      </div>
      <div>
        <h1 class="text-base font-bold text-[#2f3941]">Delete Ticket</h1>
        <p class="text-xs text-[#68737d]">This action cannot be undone.</p>
      </div>
    </div>
    <p class="text-sm text-[#2f3941] mb-4">Are you sure you want to delete <strong>#{{ ticket.id }}: {{ ticket.title }}</strong>?</p>
    <div class="flex gap-3">
      <form method="post">{% csrf_token %}<button type="submit" class="zd-btn zd-btn-danger">Yes, Delete</button></form>
      <a href="{% url 'ticket_detail' ticket.pk %}" class="zd-btn zd-btn-secondary">Cancel</a>
    </div>
  </div>
</div>
{% endblock %}
